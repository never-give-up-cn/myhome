server {
    listen 7600;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
