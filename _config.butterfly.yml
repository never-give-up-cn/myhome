# Butterfly Theme Config
# ==================================================

# Navigation
nav:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  作品集: /photos/ || fas fa-images
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart

# Social
social:
  fas fa-camera: https://500px.com/your-username || 500px || '#00ade6'
  fab fa-instagram: https://instagram.com/your-username || Instagram || '#e4405f'
  fas fa-envelope: mailto:your-email@example.com || Email || '#4a7dbe'

# Site favicon
favicon: /img/avatar.jpg

# Avatar
avatar:
  img: /img/avatar.jpg
  effect: true

# Banner
disable_top_img: false
default_top_img: /img/banner.svg
index_img: /img/banner.svg
archive_img: /img/banner.svg

# Cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/banner.svg

# Footer
footer:
  owner:
    enable: true
    since: 2024
  copyright:
    enable: true
    version: false
  custom_text: 📷 用镜头定格时光

# Aside
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 摄影爱好者 · 光影捕手
    button:
      enable: true
      icon: fas fa-camera-retro
      text: 作品集
      link: /gallery
  card_announcement:
    enable: true
    content: 📢 每一张照片，都是时光的标本。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Post meta
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    position: center
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index
index_site_info_top:
subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 📷 用镜头记录世界的每一个瞬间
    - 🌅 追逐光影，定格美好
    - 🏔️ 山河远阔，人间烟火

index_layout: 3
index_post_content:
  method: 2
  length: 300

# Post
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# Dark Mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# Read Mode
readmode: true

# Code blocks
code_blocks:
  theme: ocean
  macStyle: true
  height_limit: false
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: true

# Search
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    top_n_per_article: 1
    unescape: true

# Math
math:
  use: katex
  per_page: true

# Beautify
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#49B1F5'

# Background effects
canvas_ribbon:
  enable: true
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_nest:
  enable: false
  color: '0,0,0'
  opacity: 0.5
  zIndex: -1
  count: 99
  mobile: false

# Theme color
theme_color:
  enable: true
  main: '#49B1F5'
  paginator: '#00c4b6'
  button_hover: '#FF7242'
  text_selection: '#00c4b6'
  link_color: '#99a9bf'
  meta_color: '#858585'
  hr_color: '#A4D8FA'
  code_foreground: '#F47466'
  code_background: 'rgba(27, 31, 35, .05)'
  toc_color: '#00c4b6'
  blockquote_padding_color: '#49b1f5'
  blockquote_background_color: '#49b1f5'
  scrollbar_color: '#49b1f5'

# Rounded corners
rounded_corners_ui: true

# Mask
mask:
  header: true
  footer: true

# Preloader
preloader:
  enable: true
  source: 1

# Tags page
tag_ui: index

# Categories page
category_ui: index

# Lazyload
lazyload:
  enable: true
  native: true
  field: site
  blur: true

# Pjax
pjax:
  enable: true

# Snackbar
snackbar:
  enable: true
  position: bottom-left

# Inject
inject:
  head:
  bottom:

# Font
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

# Lightbox
lightbox: fancybox

# Busuanzi
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# wordcount
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true
