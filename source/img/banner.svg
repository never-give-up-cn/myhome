<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="400" viewBox="0 0 1920 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="40" height="40">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e" />
      <stop offset="100%" style="stop-color:#ffd200" />
    </linearGradient>
  </defs>
  <rect width="1920" height="400" fill="url(#grad)"/>
  <rect width="1920" height="400" fill="url(#dots)"/>
  <!-- Camera icon -->
  <circle cx="960" cy="130" r="38" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <rect x="928" y="92" width="64" height="20" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
  <circle cx="960" cy="130" r="16" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="2.5"/>
  <!-- Flash -->
  <rect x="988" y="100" width="8" height="8" rx="1" fill="rgba(255,215,0,0.4)"/>
  <text x="960" y="220" font-family="Georgia, 'Noto Serif SC', serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">光影捕手</text>
  <text x="960" y="270" font-family="Georgia, 'Noto Serif SC', serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">用镜头记录时光的美好</text>
  <!-- Decorative line -->
  <line x1="780" y1="294" x2="1140" y2="294" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
</svg>
