<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="40%" style="stop-color:#e94560"/>
      <stop offset="70%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#ffd166"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="280" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="550" cy="220" r="50" fill="#FFE066" opacity="0.9"/>
  <circle cx="550" cy="220" r="65" fill="#FFE066" opacity="0.2"/>
  <circle cx="550" cy="220" r="80" fill="#FFE066" opacity="0.1"/>
  <!-- Mountains -->
  <polygon points="0,280 120,120 250,280" fill="#2d3436" opacity="0.7"/>
  <polygon points="150,280 350,80 550,280" fill="#2d3436" opacity="0.5"/>
  <polygon points="400,280 600,100 800,280" fill="#2d3436" opacity="0.6"/>
  <!-- Water -->
  <rect y="280" width="800" height="220" fill="url(#water)"/>
  <!-- Reflection -->
  <ellipse cx="550" cy="380" rx="40" ry="15" fill="#FFE066" opacity="0.15"/>
  <line x1="100" y1="310" x2="700" y2="310" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="150" y1="340" x2="650" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="370" x2="600" y2="370" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Silhouette photographer -->
  <circle cx="170" cy="250" r="6" fill="#1a1a2e"/>
  <line x1="170" y1="256" x2="170" y2="278" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="170" y1="260" x2="155" y2="270" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="170" y1="260" x2="185" y2="270" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Tripod -->
  <line x1="170" y1="260" x2="200" y2="230" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="195" y="216" width="12" height="8" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <text x="400" y="470" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">追逐每一场日出日落</text>
</svg>
