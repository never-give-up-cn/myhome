<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFE066;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#636e72"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="60" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="400" cy="80" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="550" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="70" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="650" cy="100" r="1" fill="white" opacity="0.6"/>
  <circle cx="350" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="50" cy="90" r="1" fill="white" opacity="0.7"/>
  <circle cx="750" cy="50" r="1" fill="white" opacity="0.6"/>
  <!-- Moon -->
  <circle cx="600" cy="100" r="35" fill="#f0e68c" opacity="0.9"/>
  <circle cx="615" cy="92" r="30" fill="#203a43"/>
  <!-- Camera body -->
  <rect x="300" y="220" width="200" height="120" rx="12" fill="url(#lens)" stroke="#dfe6e9" stroke-width="2"/>
  <rect x="350" y="200" width="100" height="25" rx="6" fill="#2d3436" stroke="#dfe6e9" stroke-width="1.5"/>
  <!-- Lens -->
  <circle cx="400" cy="280" r="45" fill="#2d3436" stroke="#dfe6e9" stroke-width="2"/>
  <circle cx="400" cy="280" r="35" fill="#1a1a2e" stroke="#636e72" stroke-width="1"/>
  <circle cx="400" cy="280" r="25" fill="#0f2027" stroke="#636e72" stroke-width="0.5"/>
  <circle cx="400" cy="280" r="10" fill="#e94560" opacity="0.3"/>
  <!-- Lens reflection -->
  <ellipse cx="385" cy="268" rx="8" ry="4" fill="white" opacity="0.15" transform="rotate(-30 385 268)"/>
  <!-- Flash -->
  <rect x="490" y="228" width="8" height="15" rx="2" fill="#FFE066" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="320" cy="235" r="5" fill="#636e72"/>
  <rect x="460" y="208" width="12" height="8" rx="3" fill="#e94560"/>
  <!-- Base plate -->
  <text x="400" y="420" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="2">NIGHT · 长曝光</text>
  <line x1="280" y1="440" x2="520" y2="440" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
