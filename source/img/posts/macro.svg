  <line x1="200" y1="410" x2="200" y2="455" stroke="#2d6a2d" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="405" x2="400" y2="450" stroke="#2d6a2d" stroke-width="1" opacity="0.5"/>
  <!-- Butterfly -->
  <ellipse cx="300" cy="340" rx="12" ry="5" fill="#e94560" opacity="0.7" transform="rotate(-20 300 340)"/>
  <ellipse cx="310" cy="340" rx="12" ry="5" fill="#e94560" opacity="0.7" transform="rotate(20 310 340)"/>
  <line x1="305" y1="340" x2="305" y2="348" stroke="#333" stroke-width="1"/>
  <!-- Camera front view -->
  <g transform="translate(550, 200)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="url(#lensg)" stroke="#777" stroke-width="1.5"/>
    <circle cx="50" cy="40" r="25" fill="#111" stroke="#888" stroke-width="2"/>
