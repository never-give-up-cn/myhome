<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="gbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e063"/>
      <stop offset="100%" style="stop-color:#56ab2f"/>
    </linearGradient>
    <linearGradient id="lensg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gbg)"/>
  <!-- Flower field -->
  <circle cx="100" cy="400" r="4" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="150" cy="380" r="3" fill="#FFE066" opacity="0.7"/>
  <circle cx="200" cy="410" r="5" fill="#FF6B6B" opacity="0.6"/>
  <circle cx="250" cy="395" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="420" r="4" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="350" cy="385" r="5" fill="#FFE066" opacity="0.6"/>
  <circle cx="400" cy="405" r="3" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="450" cy="390" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="415" r="5" fill="#FFE066" opacity="0.6"/>
  <circle cx="550" cy="380" r="3" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="600" cy="400" r="4" fill="#fff" opacity="0.5"/>
